<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 56" fill="none">
  <!-- Option A: Terminal Prompt Wordmark -->
  <!-- Background (transparent for versatility) -->

  <!-- $ prompt symbol -->
  <text x="0" y="42" font-family="JetBrains Mono, Courier New, monospace" font-size="40" font-weight="700" fill="#00ff88">$</text>

  <!-- SudoStudy wordmark -->
  <text x="34" y="42" font-family="JetBrains Mono, Courier New, monospace" font-size="40" font-weight="700" fill="#f0f6fc">SudoStudy</text>

  <!-- Blinking cursor block -->
  <rect x="261" y="8" width="16" height="36" fill="#00ff88" rx="1">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" calcMode="discrete"/>
  </rect>
</svg>
